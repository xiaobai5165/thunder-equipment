<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雷霆战机 - 后台管理</title>
<style>
  :root {
    --bg: #050b14; --panel: #0c1525; --border: #16233f;
    --text: #c8d6e5; --text2: #5e7292;
    --accent: #00b4d8; --gold: #f0c040; --red: #f43f5e;
    --green: #22d3bb; --purple: #a855f7; --cyan: #22d3ee;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    display: flex;
  }
  /* SIDEBAR */
  .side {
    width: 215px; min-height: 100vh; background: #080f1f;
    border-right: 1px solid var(--border); position: fixed; top:0; left:0; bottom:0;
    padding: 16px 0; overflow-y: auto; z-index: 10; display:flex; flex-direction:column;
  }
  .side h2 {
    text-align:center; font-size:0.95rem; letter-spacing:2px; padding:0 16px 12px;
    border-bottom:1px solid var(--border); margin-bottom:6px;
    background:linear-gradient(180deg, #e0f2fe, var(--accent));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .side .gtitle {
    font-size:0.6rem; color:var(--text2); text-transform:uppercase;
    letter-spacing:1.5px; padding:10px 14px 3px; font-weight:700;
  }
  .side .nav {
    display:block; width:100%; padding:8px 14px; border:none; background:none;
    color:var(--text2); font-size:0.82rem; text-align:left; cursor:pointer;
    transition:all 0.15s; font-family:inherit;
  }
  .side .nav:hover { background:rgba(255,255,255,0.02); color:var(--text); }
  .side .nav.on { background:rgba(0,180,216,0.1); color:var(--accent); font-weight:600; }
  .side .nav.pageset { color:var(--gold); font-weight:700; }
  .side .nav.pageset.on { background:rgba(240,192,64,0.12); color:var(--gold); }
  .side .btns { padding:10px; border-top:1px solid var(--border); margin-top:auto; display:flex; flex-direction:column; gap:4px; }
  .side .btns a { text-decoration:none; }

  /* MAIN */
  .main { margin-left:215px; flex:1; padding:20px 24px; }
  .hbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
  .hbar h3 { font-size:1rem; letter-spacing:1px; }

  /* BTN */
  .btn {
    padding:6px 12px; border-radius:3px; border:1px solid var(--border);
    cursor:pointer; font-size:0.78rem; font-weight:600;
    background:var(--panel); color:var(--text); font-family:inherit;
    transition:all 0.15s; white-space:nowrap;
  }
  .btn:hover { border-color:var(--accent); }
  .btn1 { background:rgba(0,180,216,0.12); border-color:var(--accent); color:var(--accent); }
  .btn1:hover { background:rgba(0,180,216,0.22); }
  .btnx { border-color:rgba(244,63,94,0.3); color:var(--red); }
  .btnx:hover { background:rgba(244,63,94,0.08); border-color:var(--red); }
  .btng { background:rgba(240,192,64,0.1); border-color:var(--gold); color:var(--gold); }
  .btng:hover { background:rgba(240,192,64,0.2); }
  .btnpub {
    background:rgba(34,211,187,0.12); border-color:var(--green); color:var(--green);
    font-size:0.85rem; padding:8px 20px;
  }
  .btnpub:hover { background:rgba(34,211,187,0.22); }
  .btnsm { padding:3px 7px; font-size:0.68rem; }

  /* TABLE */
  .twrap { overflow-x:auto; border:1px solid var(--border); background:var(--panel); }
  table { width:100%; border-collapse:collapse; font-size:0.79rem; }
  thead th {
    background:#0d1a30; color:var(--accent); font-weight:600; font-size:0.68rem;
    text-align:left; padding:8px 9px; border-bottom:2px solid rgba(0,180,216,0.15);
    text-transform:uppercase; letter-spacing:0.5px; white-space:nowrap;
  }
  tbody td { padding:6px 9px; border-bottom:1px solid rgba(255,255,255,0.02); }
  tbody tr:hover { background:rgba(0,180,216,0.03); }

  .tag {
    display:inline-block; padding:2px 7px; font-size:0.66rem; font-weight:700; border-radius:2px;
  }
  .t1 { background:rgba(244,63,94,0.12); color:#f87171; }
  .t2 { background:rgba(240,192,64,0.12); color:#fbbf24; }
  .t3 { background:rgba(168,85,247,0.12); color:#c084fc; }
  .t4 { background:rgba(0,180,216,0.12); color:#67e8f9; }
  .t5 { background:rgba(107,125,153,0.12); color:#9ca3af; }
  .stag { background:rgba(34,211,238,0.07); color:var(--cyan); }

  /* MODAL */
  .modal-bg {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.72); z-index:999;
    display:flex; align-items:center; justify-content:center;
  }
  .modal-box {
    background:var(--panel); border:1px solid var(--border);
    width:92%; max-width:680px; max-height:82vh; overflow-y:auto;
    box-shadow:0 0 60px rgba(0,0,0,0.6);
  }
  .modal-hd {
    padding:12px 16px; border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center;
    position:sticky; top:0; background:var(--panel); z-index:1;
  }
  .modal-hd h4 { font-size:0.9rem; }
  .modal-cls { background:none; border:none; color:var(--text2); font-size:1.1rem; cursor:pointer; }
  .modal-cls:hover { color:var(--red); }
  .modal-bd { padding:16px; }
  .modal-ft { padding:10px 16px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:6px; }

  .fgrid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .ffull { grid-column:1/-1; }
  .fg { display:flex; flex-direction:column; gap:2px; }
  .fg label { font-size:0.7rem; color:var(--text2); font-weight:600; }
  .fg input, .fg select, .fg textarea {
    padding:6px 9px; background:var(--bg); border:1px solid var(--border);
    color:var(--text); font-size:0.8rem; outline:none; border-radius:2px; font-family:inherit;
  }
  .fg input:focus, .fg select:focus, .fg textarea:focus { border-color:var(--accent); }
  .fg textarea { resize:vertical; min-height:48px; }

  .hidden { display:none !important; }
  .empty { text-align:center; padding:40px 16px; color:var(--text2); }

  /* PAGE SETTINGS */
  .setgrid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .setgrid .fg.ffull { grid-column:1/-1; }
  .setsec { margin-bottom:20px; }
  .setsec h4 {
    font-size:0.82rem; color:var(--gold); margin-bottom:10px;
    padding-left:8px; border-left:2px solid var(--gold); letter-spacing:1px;
  }

  /* TOAST */
  .toast {
    position:fixed; bottom:24px; right:24px; z-index:1100;
    padding:9px 16px; border-radius:3px; font-size:0.8rem; font-weight:600;
    animation:si 0.3s ease; max-width:400px;
  }
  .toast-ok { background:rgba(34,211,187,0.12); border:1px solid rgba(34,211,187,0.3); color:var(--green); }
  .toast-err { background:rgba(244,63,94,0.12); border:1px solid rgba(244,63,94,0.3); color:var(--red); }
  .toast-info { background:rgba(0,180,216,0.12); border:1px solid rgba(0,180,216,0.3); color:var(--accent); }
  @keyframes si { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

  /* STATUS */
  .pub-status { font-size:0.72rem; margin-left:10px; }
  .pub-status.ok { color:var(--green); }
  .pub-status.err { color:var(--red); }
  .pub-status.info { color:var(--text2); }

  /* ====== LOGIN ====== */
  #login-wrap {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:radial-gradient(ellipse at center, #0a1628 0%, #020617 100%);
    z-index:9999; display:flex; align-items:center; justify-content:center;
    flex-direction:column;
  }
  #login-wrap canvas { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
  .login-box {
    position:relative; z-index:1; width:380px; padding:36px 30px;
    background:rgba(12,21,37,0.85); border:1px solid var(--border);
    box-shadow:0 0 60px rgba(0,0,0,0.5), 0 0 2px rgba(0,180,216,0.1);
    clip-path:polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
  }
  .login-box h2 {
    text-align:center; font-size:1.1rem; letter-spacing:3px; margin-bottom:4px;
    background:linear-gradient(180deg, #e0f2fe, var(--accent));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .login-box .sub { text-align:center; font-size:0.68rem; color:var(--text2); margin-bottom:24px; letter-spacing:1px; }
  .login-box .fg { display:flex; flex-direction:column; gap:3px; margin-bottom:14px; }
  .login-box .fg label { font-size:0.7rem; color:var(--text2); font-weight:600; letter-spacing:0.5px; }
  .login-box .fg input {
    padding:10px 12px; background:var(--bg); border:1px solid var(--border);
    color:var(--text); font-size:0.85rem; outline:none; border-radius:2px;
    font-family:inherit; transition:border-color 0.3s;
  }
  .login-box .fg input:focus { border-color:var(--accent); }
  .login-box .err-msg {
    color:var(--red); font-size:0.7rem; min-height:18px; margin-bottom:8px; text-align:center;
  }
  .login-box .btn-login {
    width:100%; padding:10px; background:rgba(0,180,216,0.12);
    border:1px solid var(--accent); color:var(--accent);
    font-size:0.85rem; font-weight:700; cursor:pointer; letter-spacing:2px;
    font-family:inherit; transition:all 0.3s;
  }
  .login-box .btn-login:hover { background:rgba(0,180,216,0.25); }
  .login-box .btn-login:disabled { opacity:0.35; cursor:not-allowed; }
  .login-box .hint {
    text-align:center; margin-top:16px; font-size:0.62rem; color:var(--text2);
    opacity:0.5; letter-spacing:0.5px;
  }
  @keyframes shake {
    0%,100% { transform:translateX(0); }
    20%,60% { transform:translateX(-6px); }
    40%,80% { transform:translateX(6px); }
  }
  .login-box.shake { animation:shake 0.4s ease; }
</style>
</head>
<body>

<!-- LOGIN -->

<div class="main">

      <input type="text" id="qsearch" placeholder="快速筛选…" style="padding:5px 9px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:2px;font-size:0.78rem;width:140px;" class="hidden">

document.getElementById('btn-save-cred').addEventListener('click', function(){
  var curPass = document.getElementById('cfg-cred-cur').value.trim();

  var newPass = document.getElementById('cfg-cred-pass').value.trim();
  var newPass2 = document.getElementById('cfg-cred-pass2').value.trim();
  var statusEl = document.getElementById('cred-status');

  if (!curPass) {
    statusEl.innerHTML = '<span style="color:var(--red);">请输入当前密码以验证身份</span>';
    return;
  }

  // Get current auth config (from localStorage or defaults)
  var saved = getSavedCreds();
  var curSalt = saved ? saved.salt : DEFAULT_CREDS.salt;
  var curPassHash = saved ? saved.passHash : DEFAULT_CREDS.passHash;

  // Verify current password (need to access sha256 from auth scope — we use the global reference)
  var inputHash = window._adminHashPass ? window._adminHashPass(curPass, curSalt) : '';
  if (!inputHash || inputHash !== curPassHash) {
    statusEl.innerHTML = '<span style="color:var(--red);">当前密码错误，无法修改</span>';
    document.getElementById('cfg-cred-cur').style.borderColor = 'var(--red)';

  }

  if (newPass && newPass.length < 4) {
    statusEl.innerHTML = '<span style="color:var(--red);">新密码长度不能少于4位</span>';
    return;
  }

  // Keep the same salt to avoid recomputation issues (salt stays fixed)
  var curSalt = saved ? saved.salt : DEFAULT_CREDS.salt;
  var curUserHash = saved ? saved.userHash : DEFAULT_CREDS.userHash;
  var curPassHash = saved ? saved.passHash : DEFAULT_CREDS.passHash;

    userHash: newUser ? window._adminHashUser(newUser, curSalt) : curUserHash,
    passHash: newPass ? window._adminHashPass(newPass, curSalt) : curPassHash,

document.getElementById('btn-publish').addEventListener('click', function(){
  var token = sessionStorage.getItem('lt_gh_token') || document.getElementById('cfg-gh-token').value.trim();
  if (!token) { toast('请先在页面设置中填写 GitHub Token', 'err'); return; }
  sessionStorage.setItem('lt_gh_token', token);

  var owner = document.getElementById('cfg-gh-owner').value.trim() || 'xiaobai5165';
  var repo = document.getElementById('cfg-gh-repo').value.trim() || 'thunder-equipment';
  localStorage.setItem('lt_gh_owner', owner);
  localStorage.setItem('lt_gh_repo', repo);

  var statusEl = document.getElementById('pub-status');
  statusEl.textContent = '正在发布...';
  statusEl.className = 'pub-status info';

  // Save config first
  saveConfigForm();

  var content = generateDataJS();
  var b64 = btoa(unescape(encodeURIComponent(content)));

  // Get current file SHA first (needed for update)
  var apiUrl = 'https://api.github.com/repos/'+owner+'/'+repo+'/contents/data.js';

  fetch(apiUrl, {
    headers: { 'Authorization': 'token '+token, 'Accept': 'application/vnd.github+json' }
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    var body = {
      message: '更新数据文件 [后台发布]',
      content: b64,
      branch: 'main'
    };
    if (data.sha) body.sha = data.sha;

    return fetch(apiUrl, {
      method: 'PUT',
      headers: { 'Authorization': 'token '+token, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
  })
  .then(function(r){
    if (!r.ok) return r.json().then(function(e){ throw new Error(e.message || 'HTTP '+r.status); });
    return r.json();
  })
  .then(function(){
    statusEl.textContent = '发布成功！1-2分钟后生效';
    statusEl.className = 'pub-status ok';
    toast('已发布到 GitHub Pages！稍等1-2分钟即可在网站看到更新');
  })
  .catch(function(err){
    statusEl.textContent = '发布失败: '+err.message;
    statusEl.className = 'pub-status err';
    toast('发布失败: '+err.message, 'err');
  });
});

      fields.push({key:'defScore',label:'战力折算',req:true});
    } else {
      fields.push({key:'atk',label:'满级攻击',req:true});
    }
    fields.push({key:'skill',label:'特技',req:true});
    fields.push({key:'skillNote',label:'效果说明',full:true});
    fields.push({key:'rank',label:'品质等级文字',req:true});
    fields.push({key:'tier',label:'品质梯队(1-5)',type:'select',opts:['1','2','3','4','5'],req:true});
  } else {
    fields = [
      {key:'name',label:'战神名称',req:true},
      {key:'mats',label:'合成材料',req:true,full:true},
      {key:'skill',label:'特技效果',req:true},
      {key:'note',label:'备注',full:true},
      {key:'tier',label:'强度梯队(1-3)',type:'select',opts:['1','2','3'],req:true}
    ];
  }

  fields.forEach(function(f){
    var val = data[f.key] !== undefined ? String(data[f.key]) : '';
    var cls = f.full ? 'ffull' : '';
    html += '<div class="fg '+cls+'">';
    html += '<label>'+f.label+(f.req?' *':'')+'</label>';
    if (f.type === 'select') {
      html += '<select id="f-'+f.key+'">';
      (f.opts||[]).forEach(function(o){
        html += '<option value="'+o+'"'+(val===o?' selected':'')+'>'+o+'</option>';
      });
      html += '</select>';
    } else {
      html += '<input type="text" id="f-'+f.key+'" value="'+esc(val)+'">';
    }
    html += '</div>';
  });

  // Image
  html += '<div class="fg ffull">';
  html += '<label>装备预览图 URL（可选）</label>';
  html += '<div style="display:flex;gap:6px;align-items:center;">';
  html += '<input type="text" id="f-img" value="'+esc(data.img||'')+'" placeholder="输入图片URL或Base64" style="flex:1;">';

  html += '<button type="button" class="btn btnsm" id="btn-img-upload" style="white-space:nowrap;">📁 上传</button>';
  html += '</div>';
  html += '<div id="img-preview" style="margin-top:6px;">'+(data.img ? '<img src="'+esc(data.img)+'" style="max-width:120px;max-height:120px;object-fit:contain;border-radius:4px;background:rgba(0,0,0,0.4);border:1px solid var(--border);" onerror="this.outerHTML=\'<span style=color:var(--red);font-size:0.7rem;>图片加载失败</span>\'">' : '')+'</div>';
  html += '</div>';
  html += '<input type="file" id="file-up" accept="image/*" style="display:none;">';

  html += '</div>';
  modalBody.innerHTML = html;

  // Bind image search
  var searchBtn = document.getElementById('btn-img-search');
  if (searchBtn) {
    searchBtn.addEventListener('click', function(){
      var nameEl = document.getElementById('f-name');

      window.open('https://cn.bing.com/images/search?q='+encodeURIComponent(query), '_blank');
    });
  }
  // Bind image upload
  var uploadBtn = document.getElementById('btn-img-upload');
  var fileUp = document.getElementById('file-up');
  if (uploadBtn && fileUp) {
    uploadBtn.addEventListener('click', function(){ fileUp.click(); });
    fileUp.addEventListener('change', function(e){

document.getElementById('btn-save').addEventListener('click', function(){

    }
    fieldDefs.push({key:'skill',req:true},{key:'skillNote'},{key:'rank',req:true},{key:'tier',req:true});
  } else {
    fieldDefs = [{key:'name',req:true},{key:'mats',req:true},{key:'skill',req:true},{key:'note'},{key:'tier',req:true}];

  var hasError = false;
  fieldDefs.forEach(function(f){

      else { el.style.borderColor = ''; }
      data[f.key] = v;
    }
  });

  if (hasError) { toast('请填写所有必填字段', 'err'); return; }

    all[cat][editIdx] = data;

    all[cat].push(data);
  }

  closeModal();

});

// ====== TABLE ACTIONS ======
document.getElementById('tbody').addEventListener('click', function(e){

  if (!target.dataset.action) return;
  var idx = parseInt(target.dataset.idx, 10);
  var items = (getEquipData()[cat] || []);

    var item = JSON.parse(JSON.stringify(items[idx]));

    openModal('编辑装备 — '+item.name, item);
  } else if (target.dataset.action === 'del') {
    if (!confirm('确定删除 "'+items[idx].name+'" 吗？此操作不可恢复。')) return;
    var all = getEquipData();
    all[cat].splice(idx, 1);
    saveEquipData(all);
    renderTable();
    toast('装备已删除');

});

loadConfigForm();

<!-- ====== AUTH SYSTEM ====== -->
<script>
(function(){

  var AUTH = {
    // SHA-256 hash of password+salt (default: admin / admin123)

    userHash: 'd8e1e43ec8802d0da4dc9ce1f6bf6b60e56df826e4de694487ade362e854854c',

          AUTH.passHash = creds.passHash;
          AUTH.salt = creds.salt;
        }
      }
    } catch(e) {}
  })();

  // --- SHA-256 implementation ---
  function sha256(str) {
    function R(n,w){return((n>>>w)|(n<<(32-w)));}
    function S(x,n){return x>>>n;} // Safe shift: handle n>=32
    var K=[1116352408,1899447441,3049323471,3921009573,961987163,1508970993,2453635748,2870763221,
      3624381080,310598401,607225278,1426881987,1925078388,2162078206,2614888103,3248222580,
      3835390401,4022224774,264347078,604807628,770255983,1249150122,1555081692,1996064986,
      2554220882,2821834349,2952996808,3210313671,3336571891,3584528711,113926993,338241895,
      666307205,773529912,1294757372,1396182291,1695183700,1986661051,2177026350,2456956037,
      2730485921,2820302411,3259730800,3345764771,3516065817,3600352804,4094571909,275423344,
      430227734,506948616,659060556,883997877,958139571,1322822218,1537002063,1747873779,
      1955562222,2024104815,2227730452,2361852424,2428436474,2756734187,3204031479,3329325298];
    var H=[1779033703,3144134277,1013904242,2773480762,1359893119,2600822924,528734635,1541459225];
    var msg=unescape(encodeURIComponent(str));
    var ml=msg.length;
    var bitsHi=Math.floor(ml/536870912); // ml*8 / 2^32 (high 32 bits of bit count)
    var bitsLo=(ml*8)|0;                  // low 32 bits of bit count
    var bytes=[];
    for(var i=0;i<ml;i++){bytes.push(msg.charCodeAt(i)&0xFF);}
    bytes.push(0x80);
    while((bytes.length+8)%64!==0){bytes.push(0);}
    // Append 64-bit big-endian length
    for(var i=0;i<4;i++){bytes.push((bitsHi>>>(24-i*8))&0xFF);}
    for(var i=0;i<4;i++){bytes.push((bitsLo>>>(24-i*8))&0xFF);}
    for(var chunk=0;chunk<bytes.length;chunk+=64){
      var W=new Array(64);
      for(var t=0;t<16;t++){W[t]=(bytes[chunk+t*4]<<24)|(bytes[chunk+t*4+1]<<16)|(bytes[chunk+t*4+2]<<8)|bytes[chunk+t*4+3];}
      for(var t=16;t<64;t++){var s0=R(W[t-15],7)^R(W[t-15],18)^(W[t-15]>>>3);var s1=R(W[t-2],17)^R(W[t-2],19)^(W[t-2]>>>10);W[t]=(W[t-16]+s0+W[t-7]+s1)|0;}
      var a=H[0],b=H[1],c=H[2],d=H[3],e=H[4],f=H[5],g=H[6],h=H[7];
      for(var t=0;t<64;t++){
        var S1=R(e,6)^R(e,11)^R(e,25),ch=(e&f)^(~e&g),t1=(h+S1+ch+K[t]+W[t])|0;
        var S0=R(a,2)^R(a,13)^R(a,22),maj=(a&b)^(a&c)^(b&c),t2=(S0+maj)|0;
        h=g;g=f;f=e;e=(d+t1)|0;d=c;c=b;b=a;a=(t1+t2)|0;
      }
      H[0]=(H[0]+a)|0;H[1]=(H[1]+b)|0;H[2]=(H[2]+c)|0;H[3]=(H[3]+d)|0;
      H[4]=(H[4]+e)|0;H[5]=(H[5]+f)|0;H[6]=(H[6]+g)|0;H[7]=(H[7]+h)|0;
    }
    function toHex(v){var h='';for(var i=0;i<8;i++){h+=((v>>>(28-i*4))&0xF).toString(16);}return h;}
    return toHex(H[0])+toHex(H[1])+toHex(H[2])+toHex(H[3])+toHex(H[4])+toHex(H[5])+toHex(H[6])+toHex(H[7]);
  }

  function hashUser(user, s){ return sha256(user+(s||AUTH.salt)); }
  function hashPass(pass, s){ var salt=s||AUTH.salt; return sha256(sha256(pass+salt)+salt); }

  // Expose for credential modification UI
  window._adminHashUser = hashUser;
  window._adminHashPass = hashPass;
  window._adminSha256 = sha256;

  // --- Rate limiting ---
  function getLockData(){
    try { return JSON.parse(localStorage.getItem(AUTH.lockKey)||'{"c":0,"t":0}'); }
    catch(e){ return {c:0,t:0}; }
  }
  function setLockData(d){ localStorage.setItem(AUTH.lockKey, JSON.stringify(d)); }

  // --- Check if locked out ---
  function isLocked(){
    var l=getLockData();
    if(l.c >= AUTH.maxAttempts){
      var elapsed = Date.now() - l.t;
      var lockMs = AUTH.lockMinutes * 60000;
      if(elapsed < lockMs) return Math.ceil((lockMs - elapsed)/60000);
      // Lock expired, reset
      setLockData({c:0,t:0});
    }
    return 0;
  }

  // --- Console protection ---
  var _consoleProtected = false;
  function protectConsole(){
    if(_consoleProtected) return;
    _consoleProtected = true;
    var noop=function(){};
    var methods=['log','warn','error','info','debug','trace','dir','group','groupEnd','table','time','timeEnd'];
    // Don't fully block — redirect to harmless state
    if(typeof console!=='undefined'){
      // Detect devtools via timing
      var start=Date.now();
      debugger;
      var elapsed=Date.now()-start;
      if(elapsed>100){
        // DevTools detected — but we won't fully block, just log warning
        var warnEl=document.getElementById('login-err');
        if(warnEl) warnEl.textContent='检测到开发者工具，请注意安全';
      }
    }
  }

  // --- Integrity check ---
  function integrityCheck(){
    // Verify key DOM elements exist — prevents DOM tampering
    if(!document.getElementById('login-wrap') || !document.getElementById('app-wrap')){
      document.body.innerHTML = '<div style="color:#f43f5e;text-align:center;padding:100px;background:#020617;height:100vh;"><h2>系统完整性校验失败</h2><p>页面已被篡改，请刷新后重试</p></div>';
      return false;
    }
    return true;
  }

  // --- Login stars bg ---
  (function(){
    var c=document.getElementById('login-stars');
    if(!c) return;
    var ctx=c.getContext('2d'),w,h,stars=[];
    function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight;}
    resize();window.addEventListener('resize',resize);
    for(var i=0;i<80;i++){
      stars.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.2+0.2,o:Math.random(),s:Math.random()*0.006+0.001,d:Math.random()*0.015-0.007});
    }
    function draw(){
      ctx.clearRect(0,0,w,h);
      stars.forEach(function(s){
        s.o+=s.d;if(s.o>1||s.o<0.15)s.d*=-1;
        ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle='rgba(150,200,230,'+s.o+')';ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    draw();
  })();

  // --- Login logic ---
  var loginWrap = document.getElementById('login-wrap');
  var appWrap = document.getElementById('app-wrap');
  var loginBox = document.getElementById('login-box');
  var errEl = document.getElementById('login-err');
  var hintEl = document.getElementById('login-hint');
  var btnLogin = document.getElementById('btn-login');
  var userInput = document.getElementById('login-user');
  var passInput = document.getElementById('login-pass');

  // Check existing session
  function checkSession(){
    try {
      var sess = sessionStorage.getItem(AUTH.sessionKey);
      if(sess){
        var data = JSON.parse(sess);
        if(data.exp > Date.now()){
          showApp();
          return true;
        }
      }
    } catch(e){}
    return false;
  }

  function showApp(){
    loginWrap.style.display = 'none';
    appWrap.style.display = '';
  }

  function doLogin(){
    var user = userInput.value.trim();
    var pass = passInput.value.trim();

    if(!user){ errEl.textContent='请输入管理员账号'; loginBox.classList.add('shake');setTimeout(function(){loginBox.classList.remove('shake');},400);return; }
    if(!pass){ errEl.textContent='请输入密码'; loginBox.classList.add('shake');setTimeout(function(){loginBox.classList.remove('shake');},400);return; }

    // Check lock
    var lockMin = isLocked();
    if(lockMin > 0){
      errEl.textContent='账号已锁定，请 '+lockMin+' 分钟后再试';
      return;
    }

    // Verify credentials
    var uHash = hashUser(user);
    var pHash = hashPass(pass);

    if(uHash === AUTH.userHash && pHash === AUTH.passHash){
      // Success
      var exp = Date.now() + 8*3600000; // 8h session
      sessionStorage.setItem(AUTH.sessionKey, JSON.stringify({exp:exp}));
      setLockData({c:0,t:0});
      errEl.textContent = '';
      errEl.style.color = 'var(--green)';
      errEl.textContent = '登录成功，正在进入...';
      setTimeout(showApp, 300);
    } else {
      // Failed
      var l = getLockData();
      l.c++; l.t = Date.now();
      setLockData(l);
      var remaining = AUTH.maxAttempts - l.c;
      if(remaining <= 0){
        errEl.textContent = '已锁定 '+AUTH.lockMinutes+' 分钟，请稍后再试';
        hintEl.textContent = '';
      } else {
        errEl.textContent = '账号或密码错误，还剩 '+remaining+' 次机会';
        hintEl.textContent = '连续输错'+AUTH.maxAttempts+'次将锁定'+AUTH.lockMinutes+'分钟';
      }
      loginBox.classList.add('shake');
      setTimeout(function(){loginBox.classList.remove('shake');},400);
      // Increasing delay
      var delay = Math.min(l.c * 500, 3000);
      btnLogin.disabled = true;
      setTimeout(function(){btnLogin.disabled = false;}, delay);
    }
  }

  // Event bindings
  btnLogin.addEventListener('click', doLogin);
  passInput.addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
  userInput.addEventListener('keydown', function(e){ if(e.key==='Enter') passInput.focus(); });

  // Update lock hint
  var lockMin = isLocked();
  if(lockMin > 0){
    errEl.textContent = '账号已锁定，请 '+lockMin+' 分钟后再试';
    hintEl.textContent = '';
    btnLogin.disabled = true;
  }

  // --- Anti-cracking: DOM integrity monitor ---
  setInterval(function(){
    if(!document.getElementById('login-wrap') && !document.getElementById('app-wrap').style.display){
      // Possible DOM tampering
    }
  }, 5000);

  // --- Anti-cracking: Disable right-click on login ---
  loginWrap.addEventListener('contextmenu', function(e){ e.preventDefault(); });

  // --- Initialize ---
  integrityCheck();
  protectConsole();

  if(!checkSession()){
    // Show login
    loginWrap.style.display = '';
    appWrap.style.display = 'none';
  }

  // Expose logout function
  window.adminLogout = function(){
    sessionStorage.removeItem(AUTH.sessionKey);
    loginWrap.style.display = '';
    appWrap.style.display = 'none';
    userInput.value = '';
    passInput.value = '';
    errEl.textContent = '';
    hintEl.textContent = '连续输错5次将锁定15分钟';
