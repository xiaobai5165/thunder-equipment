<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雷霆战机 - 后台管理</title>
<style>
  :root {
    --bg: #050b14; --panel: #0c1525; --border: #16233f;
    --text: #c8d6e5; --text2: #5e7292;
    --accent: #00b4d8; --gold: #f0c040; --red: #f43f5e;
    --green: #22d3bb; --purple: #a855f7; --cyan: #22d3ee;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    display: flex;
  }
  /* SIDEBAR */
  .side {
    width: 215px; min-height: 100vh; background: #080f1f;
    border-right: 1px solid var(--border); position: fixed; top:0; left:0; bottom:0;
    padding: 16px 0; overflow-y: auto; z-index: 10; display:flex; flex-direction:column;
  }
  .side h2 {
    text-align:center; font-size:0.95rem; letter-spacing:2px; padding:0 16px 12px;
    border-bottom:1px solid var(--border); margin-bottom:6px;
    background:linear-gradient(180deg, #e0f2fe, var(--accent));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .side .gtitle {
    font-size:0.6rem; color:var(--text2); text-transform:uppercase;
    letter-spacing:1.5px; padding:10px 14px 3px; font-weight:700;
  }
  .side .nav {
    display:block; width:100%; padding:8px 14px; border:none; background:none;
    color:var(--text2); font-size:0.82rem; text-align:left; cursor:pointer;
    transition:all 0.15s; font-family:inherit;
  }
  .side .nav:hover { background:rgba(255,255,255,0.02); color:var(--text); }
  .side .nav.on { background:rgba(0,180,216,0.1); color:var(--accent); font-weight:600; }
  .side .nav.pageset { color:var(--gold); font-weight:700; }
  .side .nav.pageset.on { background:rgba(240,192,64,0.12); color:var(--gold); }
  .side .btns { padding:10px; border-top:1px solid var(--border); margin-top:auto; display:flex; flex-direction:column; gap:4px; }
  .side .btns a { text-decoration:none; }

  /* MAIN */
  .main { margin-left:215px; flex:1; padding:20px 24px; }
  .hbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
  .hbar h3 { font-size:1rem; letter-spacing:1px; }

  /* BTN */
  .btn {
    padding:6px 12px; border-radius:3px; border:1px solid var(--border);
    cursor:pointer; font-size:0.78rem; font-weight:600;
    background:var(--panel); color:var(--text); font-family:inherit;
    transition:all 0.15s; white-space:nowrap;
  }
  .btn:hover { border-color:var(--accent); }
  .btn1 { background:rgba(0,180,216,0.12); border-color:var(--accent); color:var(--accent); }
  .btn1:hover { background:rgba(0,180,216,0.22); }
  .btnx { border-color:rgba(244,63,94,0.3); color:var(--red); }
  .btnx:hover { background:rgba(244,63,94,0.08); border-color:var(--red); }
  .btng { background:rgba(240,192,64,0.1); border-color:var(--gold); color:var(--gold); }
  .btng:hover { background:rgba(240,192,64,0.2); }
  .btnpub {
    background:rgba(34,211,187,0.12); border-color:var(--green); color:var(--green);
    font-size:0.85rem; padding:8px 20px;
  }
  .btnpub:hover { background:rgba(34,211,187,0.22); }
  .btnsm { padding:3px 7px; font-size:0.68rem; }

  /* TABLE */
  .twrap { overflow-x:auto; border:1px solid var(--border); background:var(--panel); }
  table { width:100%; border-collapse:collapse; font-size:0.79rem; }
  thead th {
    background:#0d1a30; color:var(--accent); font-weight:600; font-size:0.68rem;
    text-align:left; padding:8px 9px; border-bottom:2px solid rgba(0,180,216,0.15);
    text-transform:uppercase; letter-spacing:0.5px; white-space:nowrap;
  }
  tbody td { padding:6px 9px; border-bottom:1px solid rgba(255,255,255,0.02); }
  tbody tr:hover { background:rgba(0,180,216,0.03); }

  .tag {
    display:inline-block; padding:2px 7px; font-size:0.66rem; font-weight:700; border-radius:2px;
  }
  .t1 { background:rgba(244,63,94,0.12); color:#f87171; }
  .t2 { background:rgba(240,192,64,0.12); color:#fbbf24; }
  .t3 { background:rgba(168,85,247,0.12); color:#c084fc; }
  .t4 { background:rgba(0,180,216,0.12); color:#67e8f9; }
  .t5 { background:rgba(107,125,153,0.12); color:#9ca3af; }
  .stag { background:rgba(34,211,238,0.07); color:var(--cyan); }

  /* MODAL */
  .modal-bg {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.72); z-index:999;
    display:flex; align-items:center; justify-content:center;
  }
  .modal-box {
    background:var(--panel); border:1px solid var(--border);
    width:92%; max-width:680px; max-height:82vh; overflow-y:auto;
    box-shadow:0 0 60px rgba(0,0,0,0.6);
  }
  .modal-hd {
    padding:12px 16px; border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center;
    position:sticky; top:0; background:var(--panel); z-index:1;
  }
  .modal-hd h4 { font-size:0.9rem; }
  .modal-cls { background:none; border:none; color:var(--text2); font-size:1.1rem; cursor:pointer; }
  .modal-cls:hover { color:var(--red); }
  .modal-bd { padding:16px; }
  .modal-ft { padding:10px 16px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:6px; }

  .fgrid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .ffull { grid-column:1/-1; }
  .fg { display:flex; flex-direction:column; gap:2px; }
  .fg label { font-size:0.7rem; color:var(--text2); font-weight:600; }
  .fg input, .fg select, .fg textarea {
    padding:6px 9px; background:var(--bg); border:1px solid var(--border);
    color:var(--text); font-size:0.8rem; outline:none; border-radius:2px; font-family:inherit;
  }
  .fg input:focus, .fg select:focus, .fg textarea:focus { border-color:var(--accent); }
  .fg textarea { resize:vertical; min-height:48px; }

  .hidden { display:none !important; }
  .empty { text-align:center; padding:40px 16px; color:var(--text2); }

  /* PAGE SETTINGS */
  .setgrid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .setgrid .fg.ffull { grid-column:1/-1; }
  .setsec { margin-bottom:20px; }
  .setsec h4 {
    font-size:0.82rem; color:var(--gold); margin-bottom:10px;
    padding-left:8px; border-left:2px solid var(--gold); letter-spacing:1px;
  }

  /* TOAST */
  .toast {
    position:fixed; bottom:24px; right:24px; z-index:1100;
    padding:9px 16px; border-radius:3px; font-size:0.8rem; font-weight:600;
    animation:si 0.3s ease; max-width:400px;
  }
  .toast-ok { background:rgba(34,211,187,0.12); border:1px solid rgba(34,211,187,0.3); color:var(--green); }
  .toast-err { background:rgba(244,63,94,0.12); border:1px solid rgba(244,63,94,0.3); color:var(--red); }
  .toast-info { background:rgba(0,180,216,0.12); border:1px solid rgba(0,180,216,0.3); color:var(--accent); }
  @keyframes si { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

  /* STATUS */
  .pub-status { font-size:0.72rem; margin-left:10px; }
  .pub-status.ok { color:var(--green); }
  .pub-status.err { color:var(--red); }
  .pub-status.info { color:var(--text2); }
</style>
</head>

<script>
(function(){
// ====== DEFAULTS (in case data.js fails) ======
var DEF_CONFIG = {
  title: "雷霆战机 - 全装备数据图鉴 | 天游工作室",
  header: { title: "雷霆战机", subtitle: "天 游 工 作 室 · 全 装 备 数 据 图 鉴" },
  statsLabels: ["当 前 显 示","战 机","装 甲","副 武 器","僚 机","战 神"],
  mainTabs: { star5: "✦ 五星装备", god: "✦ 战神装备" },
  subTabs: { all:"全部", fighter:"✈ 战机", armor:"🛡 装甲", subweapon:"◎ 副武器", wingman:"✦ 僚机" },
  godSubTabs: { "god-all":"全部", "god-fighter":"✈ 战神机体", "god-armor":"🛡 战神装甲", "god-sub":"◎ 战神副武器", "god-wing":"✦ 战神僚机" },
  searchPlaceholder: "搜索装备名称 · 系列 · 特技 · 合成材料 …",
  sectionTitles: { fighter:"✈ 战机", armor:"🛡 装甲", subweapon:"◎ 副武器", wingman:"✦ 僚机" },
  godSectionTitles: { fighter:"✈ 战神机体", armor:"🛡 战神装甲", sub:"◎ 战神副武器", wing:"✦ 战神僚机" },
  footer: { line1:"数据来源：雷霆战机 Fandom Wiki · 官方资料站 · 玩家社区攻略", line2:"装备数据以游戏内实际版本为准  |  天游工作室  |  Tencent" }
};

// ====== HELPERS ======
function esc(s) { s = String(s||''); return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function toast(msg, type) {
  type = type || 'ok';
  var t = document.createElement('div');
  t.className = 'toast toast-'+type; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 3000);
}

function getConfig() {
  try { var s = localStorage.getItem('lt_page_config'); if (s) return JSON.parse(s); } catch(e) {}
  return (window.PAGE_CONFIG) ? JSON.parse(JSON.stringify(window.PAGE_CONFIG)) : JSON.parse(JSON.stringify(DEF_CONFIG));
}
function saveConfig(cfg) { localStorage.setItem('lt_page_config', JSON.stringify(cfg)); }

function getEquipData() {
  var key = mode === 'star5' ? 'lt_equip_star5' : 'lt_equip_god';
  try { var s = localStorage.getItem(key); if (s) return JSON.parse(s); } catch(e) {}
  if (mode === 'star5' && window.STAR5_DATA) return JSON.parse(JSON.stringify(window.STAR5_DATA));
  if (mode === 'god' && window.GOD_DATA) return JSON.parse(JSON.stringify(window.GOD_DATA));
  return {};
}
function saveEquipData(d) {
  var key = mode === 'star5' ? 'lt_equip_star5' : 'lt_equip_god';
  localStorage.setItem(key, JSON.stringify(d));
}

// ====== STATE ======
var mode = 'pageset';
var cat = 'pageset';
var editIdx = -1;
var catTitles = {
  pageset: {pageset:'⚙ 页面设置'},
  star5: {fighter:'五星装备 · 战机',armor:'五星装备 · 装甲',subweapon:'五星装备 · 副武器',wingman:'五星装备 · 僚机'},
  god: {fighter:'战神装备 · 机体',armor:'战神装备 · 装甲',sub:'战神装备 · 副武器',wing:'战神装备 · 僚机'},
};

// ====== PAGE SETTINGS FORM ======
function loadConfigForm() {
  var cfg = getConfig();
  document.getElementById('cfg-title').value = cfg.title || '';
  document.getElementById('cfg-header-title').value = (cfg.header && cfg.header.title) || '';
  document.getElementById('cfg-header-subtitle').value = (cfg.header && cfg.header.subtitle) || '';
  (cfg.statsLabels || []).forEach(function(v,i){
    var el = document.getElementById('cfg-stats-'+i);
    if (el) el.value = v;
  });
  document.getElementById('cfg-maintab-star5').value = (cfg.mainTabs && cfg.mainTabs.star5) || '';
  document.getElementById('cfg-maintab-god').value = (cfg.mainTabs && cfg.mainTabs.god) || '';
  ['all','fighter','armor','subweapon','wingman'].forEach(function(k){
    var el = document.getElementById('cfg-sub-'+k);
    if (el && cfg.subTabs) el.value = cfg.subTabs[k] || '';
  });
  ['god-all','god-fighter','god-armor','god-sub','god-wing'].forEach(function(k){
    var el = document.getElementById('cfg-godsub-'+k);
    if (el && cfg.godSubTabs) el.value = cfg.godSubTabs[k] || '';
  });
  document.getElementById('cfg-search').value = cfg.searchPlaceholder || '';
  ['fighter','armor','subweapon','wingman'].forEach(function(k){
    var el = document.getElementById('cfg-sect-'+k);
    if (el && cfg.sectionTitles) el.value = cfg.sectionTitles[k] || '';
  });
  ['fighter','armor','sub','wing'].forEach(function(k){
    var el = document.getElementById('cfg-godsect-'+k);
    if (el && cfg.godSectionTitles) el.value = cfg.godSectionTitles[k] || '';
  });
  document.getElementById('cfg-footer-line1').value = (cfg.footer && cfg.footer.line1) || '';
  document.getElementById('cfg-footer-line2').value = (cfg.footer && cfg.footer.line2) || '';

  // GitHub config
  document.getElementById('cfg-gh-token').value = sessionStorage.getItem('lt_gh_token') || '';
  document.getElementById('cfg-gh-owner').value = localStorage.getItem('lt_gh_owner') || 'xiaobai5165';
  document.getElementById('cfg-gh-repo').value = localStorage.getItem('lt_gh_repo') || 'thunder-equipment';
}

function saveConfigForm() {
  var cfg = {
    title: document.getElementById('cfg-title').value.trim(),
    header: {
      title: document.getElementById('cfg-header-title').value.trim(),

    },
    statsLabels: [],
    mainTabs: {},
    subTabs: {},
    godSubTabs: {},
    searchPlaceholder: document.getElementById('cfg-search').value.trim(),
    sectionTitles: {},
    godSectionTitles: {},
    footer: {
      line1: document.getElementById('cfg-footer-line1').value.trim(),
      line2: document.getElementById('cfg-footer-line2').value.trim()
    }
  };
  for (var i=0;i<6;i++) {
    var el = document.getElementById('cfg-stats-'+i);

  }
  cfg.mainTabs.star5 = document.getElementById('cfg-maintab-star5').value.trim();
  cfg.mainTabs.god = document.getElementById('cfg-maintab-god').value.trim();
  ['all','fighter','armor','subweapon','wingman'].forEach(function(k){
    var el = document.getElementById('cfg-sub-'+k);
    cfg.subTabs[k] = el ? el.value.trim() : '';
  });
  ['god-all','god-fighter','god-armor','god-sub','god-wing'].forEach(function(k){
    var el = document.getElementById('cfg-godsub-'+k);
    cfg.godSubTabs[k] = el ? el.value.trim() : '';
  });
  ['fighter','armor','subweapon','wingman'].forEach(function(k){
    var el = document.getElementById('cfg-sect-'+k);
    cfg.sectionTitles[k] = el ? el.value.trim() : '';
  });
  ['fighter','armor','sub','wing'].forEach(function(k){
    var el = document.getElementById('cfg-godsect-'+k);
    cfg.godSectionTitles[k] = el ? el.value.trim() : '';
  });

  // Save GitHub config
  var token = document.getElementById('cfg-gh-token').value.trim();
  if (token) sessionStorage.setItem('lt_gh_token', token);
  localStorage.setItem('lt_gh_owner', document.getElementById('cfg-gh-owner').value.trim());

  window.PAGE_CONFIG = cfg;
  toast('页面设置已保存');
}

document.getElementById('btn-save-config').addEventListener('click', saveConfigForm);

// ====== GENERATE data.js CONTENT ======
function generateDataJS() {
  var cfg = getConfig();
  var s5 = getEquipDataForExport('star5');
  var gd = getEquipDataForExport('god');

  var lines = [];
  lines.push('// ====== 雷霆战机 - 全装备数据文件 ======');
  lines.push('// 此文件由后台管理系统自动生成，也可手动编辑');
  lines.push('');
  lines.push('window.PAGE_CONFIG = '+JSON.stringify(cfg, null, 2)+';');
  lines.push('');
  lines.push('window.STAR5_DATA = '+JSON.stringify(s5, null, 2)+';');
  lines.push('');
  lines.push('window.GOD_DATA = '+JSON.stringify(gd, null, 2)+';');
  return lines.join('\n');
}

function getEquipDataForExport(t) {
  var key = t === 'star5' ? 'lt_equip_star5' : 'lt_equip_god';
  try { var s = localStorage.getItem(key); if (s) return JSON.parse(s); } catch(e) {}
  if (t === 'star5' && window.STAR5_DATA) return window.STAR5_DATA;
  if (t === 'god' && window.GOD_DATA) return window.GOD_DATA;
  return {};
}

// ====== PUBLISH TO GITHUB ======
document.getElementById('btn-publish').addEventListener('click', function(){
  var token = sessionStorage.getItem('lt_gh_token') || document.getElementById('cfg-gh-token').value.trim();
  if (!token) { toast('请先在页面设置中填写 GitHub Token', 'err'); return; }
  sessionStorage.setItem('lt_gh_token', token);

  var owner = document.getElementById('cfg-gh-owner').value.trim() || 'xiaobai5165';
  var repo = document.getElementById('cfg-gh-repo').value.trim() || 'thunder-equipment';
  localStorage.setItem('lt_gh_owner', owner);
  localStorage.setItem('lt_gh_repo', repo);

  var statusEl = document.getElementById('pub-status');
  statusEl.textContent = '正在发布...';
  statusEl.className = 'pub-status info';

  // Save config first
  saveConfigForm();

  var content = generateDataJS();
  var b64 = btoa(unescape(encodeURIComponent(content)));

  // Get current file SHA first (needed for update)
  var apiUrl = 'https://api.github.com/repos/'+owner+'/'+repo+'/contents/data.js';

  fetch(apiUrl, {
    headers: { 'Authorization': 'token '+token, 'Accept': 'application/vnd.github+json' }
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    var body = {
      message: '更新数据文件 [后台发布]',
      content: b64,
      branch: 'main'
    };
    if (data.sha) body.sha = data.sha;

    return fetch(apiUrl, {
      method: 'PUT',
      headers: { 'Authorization': 'token '+token, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
  })
  .then(function(r){
    if (!r.ok) return r.json().then(function(e){ throw new Error(e.message || 'HTTP '+r.status); });
    return r.json();
  })
  .then(function(){
    statusEl.textContent = '发布成功！1-2分钟后生效';
    statusEl.className = 'pub-status ok';
    toast('已发布到 GitHub Pages！稍等1-2分钟即可在网站看到更新');
  })
  .catch(function(err){
    statusEl.textContent = '发布失败: '+err.message;
    statusEl.className = 'pub-status err';
    toast('发布失败: '+err.message, 'err');
  });
});

// ====== RENDER EQUIP TABLE ======
function renderTable() {
  var items = (getEquipData()[cat] || []);
  document.getElementById('ptitle').textContent = (catTitles[mode] && catTitles[mode][cat]) || '装备列表';
  var thead = document.getElementById('thead');
  var tbody = document.getElementById('tbody');
  var empty = document.getElementById('empty-msg');

  document.getElementById('panel-pageset').classList.add('hidden');
  document.getElementById('panel-equip').classList.remove('hidden');
  document.getElementById('qsearch').classList.remove('hidden');
  document.getElementById('btn-add').classList.remove('hidden');

  if (mode === 'star5') {
    if (cat === 'armor') {
      thead.innerHTML = '<tr><th>装备名称</th><th>系列</th><th>满级生命</th><th>战力折算</th><th>特技</th><th>品质</th><th>操作</th></tr>';
    } else {
      thead.innerHTML = '<tr><th>装备名称</th><th>系列</th><th>满级攻击</th><th>特技</th><th>品质</th><th>操作</th></tr>';
    }
  } else {
    thead.innerHTML = '<tr><th>战神名称</th><th>合成材料</th><th>特技</th><th>强度</th><th>操作</th></tr>';
  }

  if (items.length === 0) {
    tbody.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  tbody.innerHTML = items.map(function(eq, i){
    var row = '';
    row += '<td><strong>'+esc(eq.name)+'</strong></td>';
    if (mode === 'star5') {
      row += '<td>'+esc(eq.series||'')+'</td>';
      if (cat === 'armor') {
        row += '<td style="color:#22d3bb;font-family:monospace">'+esc(eq.hp||'')+'</td>';
        row += '<td style="font-family:monospace">'+esc(eq.defScore||'')+'</td>';
      } else {
        row += '<td style="color:#f87171;font-family:monospace">'+esc(eq.atk||'')+'</td>';
      }
      row += '<td><span class="tag stag">'+esc(eq.skill||'')+'</span></td>';
      row += '<td><span class="tag t'+(eq.tier||5)+'">'+esc(eq.rank||'')+'</span></td>';
    } else {
      row += '<td>'+esc(eq.mats||'')+'</td>';
      row += '<td><span style="color:var(--cyan)">'+esc(eq.skill||'')+'</span></td>';
      row += '<td><span class="tag t'+(eq.tier||3)+'">T'+(eq.tier||3)+'</span></td>';
    }
    row += '<td><button class="btn btnsm" data-action="edit" data-idx="'+i+'">✎</button> <button class="btn btnsm btnx" data-action="del" data-idx="'+i+'">✕</button></td>';
    return '<tr>'+row+'</tr>';
  }).join('');
}

// ====== SWITCH PANELS ======
function switchPanel(m, c) {
  mode = m; cat = c;
  if (mode === 'pageset') {
    document.getElementById('panel-pageset').classList.remove('hidden');
    document.getElementById('panel-equip').classList.add('hidden');
    document.getElementById('qsearch').classList.add('hidden');
    document.getElementById('btn-add').classList.add('hidden');
    document.getElementById('empty-msg').classList.add('hidden');
    document.getElementById('ptitle').textContent = '⚙ 页面设置';
    loadConfigForm();
  } else {
    renderTable();
    document.getElementById('qsearch').value = '';
  }
  document.getElementById('pub-status').textContent = '';
}

// ====== NAVIGATION ======
document.querySelectorAll('.side .nav').forEach(function(nav){
  nav.addEventListener('click', function(){
    document.querySelectorAll('.side .nav').forEach(function(n){ n.classList.remove('on'); });
    nav.classList.add('on');

// ====== MODAL ======
var modalBg = document.getElementById('modal-bg');
var modalTitle = document.getElementById('modal-title');
var modalBody = document.getElementById('modal-body');

function closeModal() { modalBg.classList.add('hidden'); editIdx = -1; }
function openModal(title, data) {
  editIdx = (data && data._idx !== undefined) ? data._idx : -1;
  modalTitle.textContent = title;
  buildForm(data || {});
  modalBg.classList.remove('hidden');
}

document.getElementById('modal-close-btn').addEventListener('click', closeModal);
document.getElementById('btn-cancel').addEventListener('click', closeModal);
modalBg.addEventListener('click', function(e){ if (e.target === modalBg) closeModal(); });
document.addEventListener('keydown', function(e){ if (e.key === 'Escape' && !modalBg.classList.contains('hidden')) closeModal(); });

function buildForm(data){
  var html = '<div class="fgrid">';

  var fields;
  if (mode === 'star5') {
    fields = [
      {key:'name',label:'装备名称',req:true},
      {key:'series',label:'系列',req:true},
      {key:'evo',label:'进化路线',req:true,full:true}
    ];
    if (cat === 'armor') {
      fields.push({key:'hp',label:'满级生命',req:true});
      fields.push({key:'defScore',label:'战力折算',req:true});
    } else {
      fields.push({key:'atk',label:'满级攻击',req:true});
    }
    fields.push({key:'skill',label:'特技',req:true});
    fields.push({key:'skillNote',label:'效果说明',full:true});
    fields.push({key:'rank',label:'品质等级文字',req:true});
    fields.push({key:'tier',label:'品质梯队(1-5)',type:'select',opts:['1','2','3','4','5'],req:true});
  } else {
    fields = [
      {key:'name',label:'战神名称',req:true},
      {key:'mats',label:'合成材料',req:true,full:true},
      {key:'skill',label:'特技效果',req:true},
      {key:'note',label:'备注',full:true},
      {key:'tier',label:'强度梯队(1-3)',type:'select',opts:['1','2','3'],req:true}
    ];
  }

  fields.forEach(function(f){
    var val = data[f.key] !== undefined ? String(data[f.key]) : '';
    var cls = f.full ? 'ffull' : '';
    html += '<div class="fg '+cls+'">';
    html += '<label>'+f.label+(f.req?' *':'')+'</label>';
    if (f.type === 'select') {
      html += '<select id="f-'+f.key+'">';
      (f.opts||[]).forEach(function(o){
        html += '<option value="'+o+'"'+(val===o?' selected':'')+'>'+o+'</option>';
      });
      html += '</select>';
    } else {
      html += '<input type="text" id="f-'+f.key+'" value="'+esc(val)+'">';
    }
    html += '</div>';
  });

  // Image
  html += '<div class="fg ffull"><label>图片 URL（可选）</label><input type="text" id="f-img" value="'+esc(data.img||'')+'" placeholder="输入图片URL"></div>';

  html += '</div>';
  modalBody.innerHTML = html;
}

// ====== SAVE EQUIP ======
document.getElementById('btn-save').addEventListener('click', function(){
  var data = {};
  data.img = (document.getElementById('f-img') ? document.getElementById('f-img').value.trim() : '');

  var fieldDefs;
  if (mode === 'star5') {
    fieldDefs = [{key:'name',req:true},{key:'series',req:true},{key:'evo',req:true}];
    if (cat === 'armor') {
      fieldDefs.push({key:'hp',req:true},{key:'defScore',req:true});
    } else {
      fieldDefs.push({key:'atk',req:true});
    }
    fieldDefs.push({key:'skill',req:true},{key:'skillNote'},{key:'rank',req:true},{key:'tier',req:true});
  } else {
    fieldDefs = [{key:'name',req:true},{key:'mats',req:true},{key:'skill',req:true},{key:'note'},{key:'tier',req:true}];
  }

  var hasError = false;
  fieldDefs.forEach(function(f){
    var el = document.getElementById('f-'+f.key);
    if (el) {
      var v = el.value.trim();
      if (f.req && !v) { hasError = true; el.style.borderColor = 'var(--red)'; }
      else { el.style.borderColor = ''; }
      data[f.key] = v;
    }
  });

  if (hasError) { toast('请填写所有必填字段', 'err'); return; }

  var all = getEquipData();
  if (!all[cat]) all[cat] = [];
  if (editIdx >= 0) {
    all[cat][editIdx] = data;
  } else {
    all[cat].push(data);
  }
  saveEquipData(all);
  closeModal();
  renderTable();
  toast(editIdx >= 0 ? '装备已更新' : '装备已添加');
});

// ====== TABLE ACTIONS ======
document.getElementById('tbody').addEventListener('click', function(e){
  var target = e.target;
  if (!target.dataset.action) return;
  var idx = parseInt(target.dataset.idx, 10);
  var items = (getEquipData()[cat] || []);
  if (target.dataset.action === 'edit') {
    var item = JSON.parse(JSON.stringify(items[idx]));
    item._idx = idx;
    openModal('编辑装备 — '+item.name, item);
  } else if (target.dataset.action === 'del') {
    if (!confirm('确定删除 "'+items[idx].name+'" 吗？此操作不可恢复。')) return;
    var all = getEquipData();
    all[cat].splice(idx, 1);
    saveEquipData(all);
    renderTable();
    toast('装备已删除');
  }
});

// ====== ADD BUTTON ======
document.getElementById('btn-add').addEventListener('click', function(){
  openModal('添加装备', {});
});

// ====== SEARCH ======
document.getElementById('qsearch').addEventListener('input', function(){
  var q = this.value.toLowerCase().trim();
  var rows = document.querySelectorAll('#tbody tr');
  rows.forEach(function(tr){
    tr.style.display = !q || tr.textContent.toLowerCase().indexOf(q) >= 0 ? '' : 'none';
  });
});

// ====== EXPORT / IMPORT / RESET ======
document.getElementById('btn-export').addEventListener('click', function(){
  saveConfigForm();
  var data = {
    config: getConfig(),
    star5: getEquipDataForExport('star5'),
    god: getEquipDataForExport('god')
  };
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '雷霆战机_全数据备份.json';
  a.click();
  toast('数据已导出');
});

document.getElementById('btn-import').addEventListener('click', function(){
  document.getElementById('import-file').click();
});

document.getElementById('import-file').addEventListener('change', function(e){
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    try {
      var data = JSON.parse(ev.target.result);
      if (data.config) { saveConfig(data.config); window.PAGE_CONFIG = data.config; }
      if (data.star5) localStorage.setItem('lt_equip_star5', JSON.stringify(data.star5));
      if (data.god) localStorage.setItem('lt_equip_god', JSON.stringify(data.god));
      if (mode === 'pageset') { loadConfigForm(); } else { renderTable(); }
      toast('数据导入成功！');
    } catch(err){ toast('JSON 格式错误', 'err'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

document.getElementById('btn-reset').addEventListener('click', function(){
  if (!confirm('确定恢复所有数据为默认值吗？自定义数据将全部丢失！')) return;
  localStorage.removeItem('lt_page_config');
  localStorage.removeItem('lt_equip_star5');
  localStorage.removeItem('lt_equip_god');
  window.PAGE_CONFIG = JSON.parse(JSON.stringify(DEF_CONFIG));
  if (mode === 'pageset') { loadConfigForm(); } else { renderTable(); }
  toast('已恢复默认数据');
});

// ====== INIT ======
loadConfigForm();

})();
</script>
